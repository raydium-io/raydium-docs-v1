openapi: 3.0.3
info:
  title: "API V1 V2（舊版）"
  description: |-
    舊版 Raydium API，提供流動池資訊、價格、SDK 資料及農場詳情。
    主要用於向後相容及 SDK 用戶端。

    **遷移至 API v3：** 此處的大多數端點在 [API v3](/en/api-reference/api-v3) 中都有較新的對應版本。
    若為新整合，建議使用 v3 端點，具有更佳的效能與穩定性。
  version: 1.0.0
  contact:
    name: Raydium
    url: https://raydium.io
servers:
  - url: https://api.raydium.io
    description: "僅主網"
tags:
  - name: Ray Token
    description: "RAY 代幣供應量端點"
paths:
  /ray/totalcoins:
    get:
      summary: "取得 RAY 總供應量"
      description: "獲取 RAY 代幣總供應量。"
      operationId: getRayTotalCoins
      tags:
        - Ray Token
      responses:
        '200':
          description: "純文字格式的總供應量數字"
          content:
            text/plain:
              schema:
                type: string

  /ray/circulating:
    get:
      summary: "取得 RAY 流通供應量"
      description: "獲取 RAY 代幣流通供應量。"
      operationId: getRayCirculating
      tags:
        - Ray Token
      responses:
        '200':
          description: "純文字格式的流通供應量數字"
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        id:
          type: string
          description: "請求 ID"
        success:
          type: boolean
          example: false
